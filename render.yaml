services:
  - type: web
    name: el-wasset-crm
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elwasset-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: gh221186@gmail.com

databases:
  - name: elwasset-db
    region: frankfurt
    plan: free
    databaseName: elwasset_crm
    ipAllowList: []
